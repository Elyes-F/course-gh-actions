name: upper-build

on:
  push:
    paths:
      - ".github/workflows/upper-build.yml"
      - "upper/**"
  workflow_dispatch: # manual

jobs:
  build:
    runs-on: self-hosted
    # runs-on: macos-latest
    # runs-on: ubuntu-latestInvoke-WebRequest -Uri https://github.com/actions/runner/releases/download/v2.335.1/actions-runner-win-x64-2.335.1.zip -OutFile actions-runner-win-x64-2.335.1.zip
    steps:
      - run: Get-Location; Get-ChildItem -Force
      - uses: actions/checkout@v4
      - run: Get-Location; Get-ChildItem -Force
      # - run: go version
      - uses: actions/setup-go@v5
        with:
          # go-version: '1.22'
          go-version-file: ./upper/go.mod
          cache-dependency-path: ./upper/go.sum
      - run: go mod download
        working-directory: upper
      - run: |
          ls
          go build
          ls
          go test
          ./upper foo the bar
        working-directory: upper
        name: build and test